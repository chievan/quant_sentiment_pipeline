name: Standalone Quant Sentiment Pipeline

# Trigger: runs every 8 hours and allows manual run
on:
  schedule:
    - cron: '0 */8 * * *' # Every 8 hours (UTC 0:00, 8:00, 16:00 -> Beijing 8:00, 16:00, 0:00)
  workflow_dispatch:      # Allows manual trigger in GitHub actions page

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create Data Directories
      run: |
        mkdir -p data/factors

    - name: Run Quant Sentiment Pipeline
      run: |
        python src/pipeline.py

    - name: Send Factor Report Email
      env:
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      run: |
        python src/utils/send_email.py
