name: Quant Sentiment Pipeline

# Trigger: Disabled (commented out per user request)
# on:
#   workflow_dispatch:
#   schedule:
#     - cron: '0 */2 * * *'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出代码
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. 安装依赖
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # 假设根目录下有 requirements.txt。如果没有，可以手动指定安装，例如 pip install pandas requests pypdf
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas requests pypdf openpyxl; fi

    # 4. 运行流水线脚本
    - name: Run Pipeline
      env:
        # 将 GitHub Secrets 映射为环境变量，供 Python 脚本读取
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python src/pipeline.py

    # 5. (可选) 将新生成的 CSV 因子表提交并推送到仓库
    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # 仅当 data/factors 下有文件变化时才提交
        git add data/factors/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update sentiment factors CSV" && git push)
